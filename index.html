<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MGC Motorsports | Experience Matters</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Helvetica, Arial, sans-serif;
      background: #000;
    }

    .hero {
      height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,.30), rgba(0,0,0,.10)),
        url("hero.jpeg") center center / cover no-repeat;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      text-align: center;
      color: white;
      padding-top: 12vh;  
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 3.5vw, 3rem);
      letter-spacing: .28em;
      font-weight: 700;
    }

    p {
      margin-top: 1rem;
      font-size: clamp(.95rem, 1.5vw, 1.4rem);
      letter-spacing: .04em;
    }

    .hero-content {
      text-align: center;
}

.hero-content h1 {
    opacity: 0;
    transform: translateY(18px);
    animation: fadeUp 1.0s ease forwards;
}

.hero-content p {
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 1.0s ease forwards;
    animation-delay: .65s;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(18px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}
  </style>
  
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
  
</head>
<body>
  <main class="hero">
    <div class="hero-content">
      <h1>MGC MOTORSPORTS</h1>
      <p>Experience Matters.</p>
    </div>
  </main>
</body>
</html>
