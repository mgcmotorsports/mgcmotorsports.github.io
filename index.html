<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MGC Motorsports</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Helvetica, Arial, sans-serif;
      background: #000;
    }

    .hero {
      height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.15)),
        url("hero.jpg") center center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: .18em;
      font-weight: 700;
    }

    p {
      margin-top: 1rem;
      font-size: clamp(1.1rem, 2vw, 1.7rem);
      letter-spacing: .04em;
    }
  </style>
</head>
<body>
  <main class="hero">
    <div>
      <h1>MGC MOTORSPORTS</h1>
      <p>Experience Matters.</p>
    </div>
  </main>
</body>
</html>
